<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emotion Mirror</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    #subtitle {
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 18px;
    }

    #stage {
      position: relative;
      width: 100%;
      max-width: 700px;
      background: #0a0a0a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 0 1px #222, 0 6px 24px rgba(0,0,0,0.5);
    }

    #vid {
      display: block;
      width: 100%;
      height: auto;
      transform: scaleX(-1); /* mirror so it feels like looking in a mirror */
    }

    #cvs {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #no-face {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 1;
      transition: opacity 0.3s;
    }
    #no-face.hidden { opacity: 0; }

    .ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #2a2a2a;
      border-top-color: #4d8fff;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #no-face p { font-size: 0.9rem; color: #fff; }

    #statusbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.76rem;
      color: #444;
    }
    #dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.3s;
    }
    #dot.on  { background: #3ddc84; }
    #dot.err { background: #e05252; }
  </style>
</head>
<body>

<h1>Emotion Mirror</h1>
<p id="subtitle">real-time face emotion detection</p>

<div id="stage">
  <video id="vid" autoplay muted playsinline></video>
  <canvas id="cvs"></canvas>
  <div id="no-face">
    <div class="ring"></div>
    <p>Looking for a face...</p>
  </div>
</div>

<div id="statusbar">
  <div id="dot"></div>
  <span id="status">starting...</span>
</div>

<script>
  const vid    = document.getElementById("vid");
  const cvs    = document.getElementById("cvs");
  const ctx    = cvs.getContext("2d");
  const noFace = document.getElementById("no-face");
  const dot    = document.getElementById("dot");
  const status = document.getElementById("status");

  const COLORS = {
    happy: "#32dc64",
    sad: "#6496e0",
    angry: "#e05050",
    surprised: "#e0c832",
    neutral: "#a0a0a0",
    uncertain: "#444",
  };

  const EMOJI = {
    happy: "\u{1F604}",
    sad: "\u{1F622}",
    angry: "\u{1F620}",
    surprised: "\u{1F632}",
    neutral: "\u{1F610}",
    uncertain: "\u{2753}",
  };

  function resizeCanvas() {
    if (vid.videoWidth) {
      cvs.width  = vid.videoWidth;
      cvs.height = vid.videoHeight;
    }
  }
  vid.addEventListener("loadedmetadata", resizeCanvas);
  window.addEventListener("resize", resizeCanvas);

  // offscreen canvas to capture the unmirrored frame for the server
  // (the video element is CSS-mirrored but drawImage ignores that)
  const offscreen = document.createElement("canvas");
  const offCtx    = offscreen.getContext("2d");

  let ws      = null;
  let sending = false;

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      dot.className   = "on";
      status.textContent = "connected";
      loop();
    };

    ws.onmessage = (e) => {
      sending = false;
      let faces;
      try { faces = JSON.parse(e.data); }
      catch { return; }

      noFace.classList.toggle("hidden", faces.length > 0);
      draw(faces);
    };

    ws.onclose = () => {
      dot.className      = "err";
      status.textContent = "disconnected, retrying...";
      sending = false;
      setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      dot.className      = "err";
      status.textContent = "connection error";
    };
  }

  function loop() {
    setInterval(() => {
      if (sending || !ws || ws.readyState !== WebSocket.OPEN) return;
      if (!vid.videoWidth) return;

      offscreen.width  = vid.videoWidth;
      offscreen.height = vid.videoHeight;
      offCtx.drawImage(vid, 0, 0);
      ws.send(offscreen.toDataURL("image/jpeg", 0.85));
      sending = true;
    }, 100);
  }

  function draw(faces) {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    const W = cvs.width;

    faces.forEach(f => {
      const [rx, ry, rw, rh] = f.bbox;
      const color = COLORS[f.emotion] || "#888";
      const emoji = EMOJI[f.emotion]  || "";

      // server coords come from the raw (unmirrored) frame, so flip X
      // to match what the user sees on the CSS-mirrored video
      const x = W - rx - rw;
      const y = ry;
      const w = rw;
      const h = rh;

      ctx.strokeStyle = color;
      ctx.lineWidth   = 2;
      ctx.strokeRect(x, y, w, h);

      const labelText = `${emoji} ${f.emotion}`;
      const confText  = `${Math.round(f.confidence * 100)}%`;

      ctx.font = "bold 13px system-ui";
      const lw = ctx.measureText(labelText).width;
      ctx.font = "11px system-ui";
      const cw = ctx.measureText(confText).width;

      const bw = Math.max(lw, cw) + 14;
      const bh = 42;
      const bx = x;
      const by = Math.max(0, y - bh - 4);

      ctx.fillStyle = "rgba(0,0,0,0.7)";
      pill(ctx, bx, by, bw, bh, 5);
      ctx.fill();

      ctx.fillStyle = color;
      ctx.font      = "bold 13px system-ui";
      ctx.fillText(labelText, bx + 7, by + 16);

      ctx.fillStyle = "#999";
      ctx.font      = "11px system-ui";
      ctx.fillText(confText, bx + 7, by + 32);

      // confidence bar
      const barY = y + h + 5;
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(x, barY, w, 4);
      ctx.fillStyle = color;
      ctx.fillRect(x, barY, Math.round(w * f.confidence), 4);
    });
  }

  function pill(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h,     x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y,         x + r, y);
    ctx.closePath();
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      vid.srcObject = stream;
      status.textContent = "camera ready";
      connect();
    } catch (err) {
      dot.className      = "err";
      status.textContent = `camera error: ${err.message}`;
    }
  }

  startCamera();
</script>
</body>
</html>
